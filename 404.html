<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 · Page not found · Mateaș Andrei</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=Instrument+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#0b0b0e; --text:#f2f0ec; --dim:#a7a7ad; --mut:#6f6f76; --accent:#ff4d2e; --line:rgba(255,255,255,.1); }
        *{ box-sizing:border-box; margin:0; padding:0; }
        html,body{ height:100%; }
        body{
            background:
                radial-gradient(90% 120% at 80% 10%, rgba(255,77,46,.10) 0%, rgba(255,77,46,0) 55%),
                var(--bg);
            color:var(--dim); font-family:'Instrument Sans','Segoe UI',Arial,sans-serif; line-height:1.6;
            display:grid; place-items:center; padding:2rem; text-align:center;
        }
        .wrap{ max-width:560px; }
        .code{ font-family:'Syne',Arial,sans-serif; font-weight:800; font-size:clamp(4.5rem,18vw,9rem); line-height:1; letter-spacing:-.03em; color:var(--text); }
        .code span{ color:var(--accent); }
        h1{ font-family:'Syne',Arial,sans-serif; font-weight:700; font-size:clamp(1.3rem,4vw,1.8rem); color:var(--text); margin:.6rem 0 .8rem; text-transform:uppercase; letter-spacing:-.01em; }
        p{ font-size:1rem; color:var(--dim); margin:0 auto 1.8rem; max-width:44ch; }
        .actions{ display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap; }
        a{ text-decoration:none; }
        .btn{ display:inline-flex; align-items:center; gap:.4rem; font-weight:600; font-size:.95rem; padding:.85rem 1.5rem; border-radius:999px; transition:transform .2s, background .2s, border-color .2s; }
        .btn--solid{ background:var(--accent); color:#0b0b0e; }
        .btn--solid:hover{ transform:translateY(-2px); }
        .btn--ghost{ border:1px solid var(--line); color:var(--text); }
        .btn--ghost:hover{ border-color:var(--accent); color:var(--accent); }
        .links{ margin-top:1.6rem; font-size:.85rem; color:var(--mut); }
        .links a{ color:var(--dim); border-bottom:1px solid var(--line); padding-bottom:1px; }
        .links a:hover{ color:var(--accent); border-color:var(--accent); }
    </style>
    <script defer data-domain="mateas-andrei.vercel.app" src="https://plausible.io/js/script.js"></script>
</head>
<body>
    <div class="wrap">
        <div class="code">4<span>0</span>4</div>
        <h1>Page not found</h1>
        <p>This page doesn't exist or has moved. The rest of the site is very much alive, though.</p>
        <div class="actions">
            <a class="btn btn--solid" href="/">Back to home</a>
            <a class="btn btn--ghost" href="/#work">See the work</a>
        </div>
        <div class="links">
            or <a href="/#contact">get in touch</a> · <a href="/resume/resume.html">résumé</a>
        </div>
    </div>
</body>
</html>
