<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<title>Asteroids · a game by Mateaș Andrei</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600..800&family=Instrument+Sans:wght@400..600&display=swap" rel="stylesheet">
<style>
    :root{
        --bg:#0b0b0e; --panel:#141419; --text:#f2f0ec; --dim:#a7a7ad; --mut:#6f6f76;
        --accent:#ff4d2e; --accent-2:#ff8a3d; --line:rgba(255,255,255,.1); --ok:#5fd99a;
        --ff:'Instrument Sans','Segoe UI',Arial,sans-serif;
        --ff-d:'Syne',Arial,sans-serif;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
    body{
        background:
            radial-gradient(90% 70% at 80% -5%, rgba(255,77,46,.10) 0%, rgba(255,77,46,0) 55%),
            var(--bg);
        color:var(--text); font-family:var(--ff);
        min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:.9rem; padding:1rem; overflow:hidden;
    }
    a{ color:inherit; }

    .top{ width:100%; max-width:520px; display:flex; align-items:baseline; justify-content:space-between; gap:1rem; }
    .brand{ font-family:var(--ff-d); font-weight:800; letter-spacing:-.01em; font-size:1.15rem; text-transform:uppercase; }
    .brand b{ color:var(--accent); }
    .back{ font-size:.82rem; color:var(--dim); text-decoration:none; border-bottom:1px solid var(--line); padding-bottom:1px; }
    .back:hover{ color:var(--accent); border-color:var(--accent); }

    .hud{ width:100%; max-width:520px; display:flex; align-items:center; justify-content:space-between; gap:.75rem; font-size:.8rem; }
    .stat{ display:flex; flex-direction:column; gap:2px; }
    .stat .k{ font-size:.62rem; letter-spacing:.16em; text-transform:uppercase; color:var(--mut); }
    .stat .v{ font-family:var(--ff-d); font-weight:700; font-size:1.05rem; color:var(--text); font-variant-numeric:tabular-nums; }
    .stat .v.accent{ color:var(--accent); }
    .lives{ display:flex; gap:5px; align-items:center; height:1.05rem; }
    .life{ width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px rgba(255,77,46,.7); }
    .life.gone{ background:transparent; border:1px solid var(--mut); box-shadow:none; }
    .mute{ background:none; border:1px solid var(--line); color:var(--dim); width:34px; height:34px; border-radius:9px; cursor:pointer; font-size:1rem; display:grid; place-items:center; transition:.2s; }
    .mute:hover{ border-color:var(--accent); color:var(--accent); }

    .stage{ position:relative; width:100%; max-width:520px; }
    canvas{ display:block; width:100%; border:1px solid var(--line); border-radius:14px; background:linear-gradient(180deg, #0e0e13, #0a0a0d); touch-action:none; cursor:crosshair; }

    .overlay{
        position:absolute; inset:0; display:grid; place-items:center; text-align:center;
        background:rgba(8,8,11,.72); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
        border-radius:14px; padding:1.5rem; transition:opacity .25s; z-index:2;
    }
    .overlay.hidden{ opacity:0; pointer-events:none; }
    .overlay h1{ font-family:var(--ff-d); font-weight:800; font-size:clamp(1.9rem,7vw,2.6rem); text-transform:uppercase; letter-spacing:-.02em; line-height:.98; }
    .overlay h1 span{ color:var(--accent); }
    .overlay .sub{ color:var(--dim); font-size:.95rem; margin:.5rem auto 1.1rem; max-width:32ch; }
    .overlay .big{ font-family:var(--ff-d); font-weight:800; font-size:2.2rem; color:var(--accent); margin:.2rem 0; }
    .legend{ display:flex; gap:.9rem; justify-content:center; flex-wrap:wrap; margin:.2rem auto 1.2rem; font-size:.72rem; color:var(--dim); }
    .legend span{ display:inline-flex; align-items:center; gap:.35rem; }
    .dot{ width:12px; height:12px; border-radius:3px; }
    .btn{ font-family:var(--ff); font-weight:600; font-size:1rem; padding:.8rem 1.6rem; border-radius:999px; border:none; cursor:pointer;
        background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#0b0b0e; transition:transform .15s, box-shadow .2s; box-shadow:0 12px 30px -12px rgba(255,77,46,.7); }
    .btn:hover{ transform:translateY(-2px); }
    .btn:active{ transform:translateY(0); }

    .hint{ font-size:.78rem; color:var(--mut); text-align:center; max-width:520px; }
    .hint b{ color:var(--dim); font-weight:600; }
    @media (max-width:540px){ .hint .desk{ display:none; } }
    @media (min-width:541px){ .hint .touch{ display:none; } }

    /* touch controls */
    .tc{ display:none; position:absolute; inset:0; z-index:3; pointer-events:none; }
    .tc button{
        position:absolute; pointer-events:auto; width:64px; height:64px; border-radius:50%;
        border:1px solid var(--line); background:rgba(20,20,25,.55); color:var(--text);
        font-family:var(--ff-d); font-weight:800; font-size:1.4rem; display:grid; place-items:center;
        -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); user-select:none; -webkit-user-select:none;
        -webkit-touch-callout:none; touch-action:none; transition:background .12s, transform .12s;
    }
    .tc button:active{ background:rgba(255,77,46,.4); transform:scale(.94); }
    .tc .tc-left{ left:14px; bottom:18px; }
    .tc .tc-right{ left:88px; bottom:18px; }
    .tc .tc-thrust{ right:88px; bottom:18px; }
    .tc .tc-fire{ right:14px; bottom:18px; background:rgba(255,77,46,.28); border-color:rgba(255,77,46,.5); }
    body.touch .tc{ display:block; }
</style>
</head>
<body>
    <div class="top">
        <div class="brand">Aster<b>oids</b></div>
        <a class="back" href="/">← back to site</a>
    </div>

    <div class="hud">
        <div class="stat"><span class="k">Score</span><span class="v" id="score">0</span></div>
        <div class="stat"><span class="k">Wave</span><span class="v accent" id="wave">1</span></div>
        <div class="stat"><span class="k">Best</span><span class="v" id="best">0</span></div>
        <div class="stat"><span class="k">Lives</span><span class="lives" id="lives"></span></div>
        <button class="mute" id="mute" aria-label="Toggle sound" title="Toggle sound">♪</button>
    </div>

    <div class="stage">
        <canvas id="c"></canvas>
        <div class="overlay" id="overlay">
            <div>
                <h1 id="title">Aster<span>oids</span></h1>
                <p class="sub" id="msg">Rotate, thrust, and blast the rocks. Do not get hit.</p>
                <div class="big" id="bigline" hidden></div>
                <div class="legend" id="legend">
                    <span><i class="dot" style="background:#ff4d2e"></i>Rotate: arrows / A D</span>
                    <span><i class="dot" style="background:#ff8a3d"></i>Thrust: up / W</span>
                    <span><i class="dot" style="background:#f2f0ec"></i>Fire: Space</span>
                </div>
                <button class="btn" id="startBtn">Play</button>
            </div>
        </div>
        <div class="tc" id="tc">
            <button class="tc-left" id="tcLeft" aria-label="Rotate left">↺</button>
            <button class="tc-right" id="tcRight" aria-label="Rotate right">↻</button>
            <button class="tc-thrust" id="tcThrust" aria-label="Thrust">▲</button>
            <button class="tc-fire" id="tcFire" aria-label="Fire">◉</button>
        </div>
    </div>

    <p class="hint">
        <span class="desk">Rotate: <b>← →</b> or <b>A D</b> · Thrust: <b>↑</b> or <b>W</b> · Fire: <b>Space</b> · Pause: <b>P</b></span>
        <span class="touch">Rotate and thrust with the left buttons · Fire with the right button</span>
    </p>

<script>
(function(){
    'use strict';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const titleEl = document.getElementById('title');
    const msgEl = document.getElementById('msg');
    const bigEl = document.getElementById('bigline');
    const legendEl = document.getElementById('legend');
    const startBtn = document.getElementById('startBtn');
    const scoreEl = document.getElementById('score');
    const waveEl = document.getElementById('wave');
    const bestEl = document.getElementById('best');
    const livesEl = document.getElementById('lives');
    const muteBtn = document.getElementById('mute');

    let W = 480, H = 600, DPR = 1;
    function fit(){
        const cssW = Math.min(canvas.parentElement.clientWidth, 520);
        const cssH = Math.round(cssW * 1.0);
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        canvas.style.height = cssH + 'px';
        canvas.width = Math.round(cssW * DPR);
        canvas.height = Math.round(cssH * DPR);
        W = cssW; H = cssH;
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        buildStars();
    }

    const S = { MENU:0, PLAY:1, OVER:2 };
    let state = S.MENU;
    let score = 0, best = +(localStorage.getItem('asteroids_hs') || 0);
    let lives = 3, wave = 1;
    let muted = localStorage.getItem('asteroids_muted') === '1';
    let paused = false;

    let ship, bullets = [], rocks = [], particles = [], stars = [];
    let shake = 0;

    const SHIP_R = 13;
    const TURN = 4.2;            // radians / second
    const THRUST = 240;          // px / second^2
    const DRAG = 0.6;            // per second velocity damping factor
    const MAX_SPEED = 360;
    const BULLET_SPEED = 460;
    const BULLET_LIFE = 0.95;    // seconds
    const FIRE_COOLDOWN = 0.22;  // seconds
    const RESPAWN_INVULN = 3;    // seconds of blinking invulnerability

    bestEl.textContent = best;
    muteBtn.textContent = muted ? '⊘' : '♪';

    if (matchMedia('(pointer:coarse)').matches) document.body.classList.add('touch');

    // ---- audio ----
    let actx = null;
    function beep(freq, dur, type, vol){
        if (muted) return;
        try {
            if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type || 'square'; o.frequency.value = freq;
            g.gain.value = (vol || 0.05);
            o.connect(g); g.connect(actx.destination);
            const t = actx.currentTime;
            g.gain.setValueAtTime(g.gain.value, t);
            g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.08));
            o.start(t); o.stop(t + (dur || 0.08));
        } catch(e){}
    }
    function explosionSound(size){
        const base = size===3 ? 90 : (size===2 ? 150 : 230);
        beep(base, 0.22, 'sawtooth', 0.05);
        beep(base*0.6, 0.3, 'triangle', 0.04);
    }

    // ---- starfield ----
    function buildStars(){
        stars = [];
        const n = Math.round(W*H/5200);
        for (let i=0;i<n;i++){
            stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.3+0.2, a: Math.random()*0.5+0.2 });
        }
    }

    // ---- helpers ----
    function wrap(o){
        if (o.x < 0) o.x += W; else if (o.x > W) o.x -= W;
        if (o.y < 0) o.y += H; else if (o.y > H) o.y -= H;
    }
    function rand(a,b){ return a + Math.random()*(b-a); }

    // ---- ship ----
    function makeShip(){
        return { x: W/2, y: H/2, vx:0, vy:0, angle:-Math.PI/2, thrusting:false, invuln: RESPAWN_INVULN, blink:0, cooldown:0, alive:true };
    }

    // ---- asteroids ----
    // size: 3 large, 2 medium, 1 small
    function rockRadius(size){ return size===3 ? 46 : (size===2 ? 26 : 14); }
    function makeRock(x, y, size){
        const r = rockRadius(size);
        const verts = [];
        const n = 9 + Math.floor(Math.random()*4);
        for (let i=0;i<n;i++){
            verts.push(rand(0.72, 1.12));
        }
        const speed = rand(20, 55) * (4 - size) * 0.6 + wave*3;
        const dir = rand(0, Math.PI*2);
        return {
            x, y, size, r,
            vx: Math.cos(dir)*speed, vy: Math.sin(dir)*speed,
            angle: rand(0, Math.PI*2), spin: rand(-0.9, 0.9),
            verts, n
        };
    }
    function spawnWave(){
        rocks = [];
        const count = 3 + wave;
        for (let i=0;i<count;i++){
            // spawn away from ship center
            let x, y;
            do {
                x = Math.random()*W; y = Math.random()*H;
            } while (Math.hypot(x-W/2, y-H/2) < 130);
            rocks.push(makeRock(x, y, 3));
        }
    }

    // ---- particles ----
    function burst(x, y, color, n, spread){
        for (let i=0;i<n;i++){
            const a = Math.random()*Math.PI*2, s = rand(30, spread||200);
            particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, col:color, sz:1+Math.random()*2.2 });
        }
    }

    // ---- game flow ----
    function updateHud(){
        scoreEl.textContent = score;
        waveEl.textContent = wave;
        bestEl.textContent = best;
        const slots = Math.max(3, lives);
        let html = '';
        for (let i=0;i<slots;i++) html += '<span class="life'+(i<lives?'':' gone')+'"></span>';
        livesEl.innerHTML = html;
    }

    function showOverlay(title, msg, big, btn, showLegend){
        titleEl.innerHTML = title;
        msgEl.textContent = msg || '';
        if (big){ bigEl.hidden = false; bigEl.textContent = big; } else bigEl.hidden = true;
        legendEl.style.display = showLegend ? 'flex' : 'none';
        startBtn.textContent = btn || 'Play';
        overlay.classList.remove('hidden');
    }
    function hideOverlay(){ overlay.classList.add('hidden'); }

    function startGame(){
        score = 0; lives = 3; wave = 1;
        bullets = []; particles = [];
        ship = makeShip();
        spawnWave();
        state = S.PLAY; paused = false;
        hideOverlay(); updateHud();
    }
    function nextWave(){
        wave++;
        spawnWave();
        updateHud();
    }

    function loseLife(){
        lives--; updateHud();
        burst(ship.x, ship.y, '#ff8a3d', 30, 260);
        burst(ship.x, ship.y, '#f2f0ec', 16, 180);
        shake = 16;
        beep(110, 0.35, 'sawtooth', 0.05);
        ship.alive = false;
        if (lives <= 0){
            state = S.OVER;
            if (score > best){ best = score; localStorage.setItem('asteroids_hs', best); }
            showOverlay('Game <span>over</span>', 'Your ship is space dust.', 'Score ' + score, 'Play again', false);
            updateHud();
        } else {
            // respawn after a short beat
            setTimeout(()=>{
                if (state !== S.PLAY) return;
                ship = makeShip();
            }, 700);
        }
    }

    function splitRock(rock){
        score += rock.size===3 ? 20 : (rock.size===2 ? 50 : 100);
        if (score > best){ best = score; localStorage.setItem('asteroids_hs', best); }
        updateHud();
        burst(rock.x, rock.y, '#ff8a3d', rock.size*8, 120 + rock.size*30);
        explosionSound(rock.size);
        shake = Math.min(shake + rock.size*2, 14);
        if (rock.size > 1){
            for (let i=0;i<2;i++){
                const nr = makeRock(rock.x, rock.y, rock.size-1);
                rocks.push(nr);
            }
        }
    }

    // ---- input ----
    const keys = { left:false, right:false, thrust:false, fire:false };

    window.addEventListener('keydown', (e)=>{ handleKey(e.code, true, e); });
    window.addEventListener('keyup', (e)=>{ handleKey(e.code, false, e); });

    function handleKey(code, down, e){
        switch(code){
            case 'ArrowLeft': case 'KeyA': keys.left = down; break;
            case 'ArrowRight': case 'KeyD': keys.right = down; break;
            case 'ArrowUp': case 'KeyW': keys.thrust = down; break;
            case 'Space':
                if (e) e.preventDefault();
                if (down){
                    if (state === S.MENU || state === S.OVER){ startGame(); }
                    else keys.fire = true;
                } else keys.fire = false;
                break;
            case 'KeyP':
                if (down) togglePause();
                break;
            case 'Enter':
                if (down && (state === S.MENU || state === S.OVER)) startGame();
                break;
        }
    }

    function togglePause(){
        if (state !== S.PLAY) return;
        paused = !paused;
        if (paused) showOverlay('Paused', 'Press P or tap Resume to continue.', null, 'Resume', false);
        else hideOverlay();
    }
    document.addEventListener('visibilitychange', ()=>{
        if (document.hidden && state === S.PLAY && !paused){ paused = true; showOverlay('Paused', 'Tap Resume to continue.', null, 'Resume', false); }
    });

    startBtn.addEventListener('click', ()=>{
        if (state === S.MENU || state === S.OVER) startGame();
        else if (paused) togglePause();
    });
    muteBtn.addEventListener('click', ()=>{
        muted = !muted; localStorage.setItem('asteroids_muted', muted?'1':'0');
        muteBtn.textContent = muted ? '⊘' : '♪';
    });

    // touch controls
    function bindHold(el, on){
        const start = (e)=>{ e.preventDefault(); on(true); };
        const end = (e)=>{ e.preventDefault(); on(false); };
        el.addEventListener('touchstart', start, {passive:false});
        el.addEventListener('touchend', end, {passive:false});
        el.addEventListener('touchcancel', end, {passive:false});
        el.addEventListener('pointerdown', start);
        el.addEventListener('pointerup', end);
        el.addEventListener('pointerleave', end);
    }
    bindHold(document.getElementById('tcLeft'), (d)=>{ keys.left = d; });
    bindHold(document.getElementById('tcRight'), (d)=>{ keys.right = d; });
    bindHold(document.getElementById('tcThrust'), (d)=>{ keys.thrust = d; });
    bindHold(document.getElementById('tcFire'), (d)=>{
        if (d){
            if (state === S.MENU || state === S.OVER){ startGame(); return; }
            keys.fire = true;
        } else keys.fire = false;
    });

    // ---- firing ----
    function fire(){
        if (!ship || !ship.alive || ship.cooldown > 0) return;
        const tipX = ship.x + Math.cos(ship.angle) * SHIP_R;
        const tipY = ship.y + Math.sin(ship.angle) * SHIP_R;
        bullets.push({
            x: tipX, y: tipY,
            vx: Math.cos(ship.angle)*BULLET_SPEED + ship.vx,
            vy: Math.sin(ship.angle)*BULLET_SPEED + ship.vy,
            life: BULLET_LIFE
        });
        ship.cooldown = FIRE_COOLDOWN;
        beep(720, 0.06, 'square', 0.035);
    }

    // ---- update ----
    function update(dt){
        // particles
        for (let i=particles.length-1;i>=0;i--){
            const p = particles[i];
            p.life -= dt*1.6;
            if (p.life <= 0){ particles.splice(i,1); continue; }
            p.x += p.vx*dt; p.y += p.vy*dt;
            p.vx *= (1 - 1.2*dt); p.vy *= (1 - 1.2*dt);
        }
        if (shake > 0) shake = Math.max(0, shake - dt*40);

        if (state !== S.PLAY) return;

        // ship
        if (ship && ship.alive){
            if (keys.left) ship.angle -= TURN*dt;
            if (keys.right) ship.angle += TURN*dt;
            ship.thrusting = keys.thrust;
            if (keys.thrust){
                ship.vx += Math.cos(ship.angle)*THRUST*dt;
                ship.vy += Math.sin(ship.angle)*THRUST*dt;
                if (Math.random() < 0.5){
                    const bx = ship.x - Math.cos(ship.angle)*SHIP_R;
                    const by = ship.y - Math.sin(ship.angle)*SHIP_R;
                    particles.push({ x:bx, y:by, vx:-Math.cos(ship.angle)*80 + rand(-30,30), vy:-Math.sin(ship.angle)*80 + rand(-30,30), life:1, col:'#ff8a3d', sz:1.6 });
                }
                if (!thrustHumOn) startThrustHum();
            } else if (thrustHumOn) stopThrustHum();
            // drag
            ship.vx *= (1 - DRAG*dt);
            ship.vy *= (1 - DRAG*dt);
            const sp = Math.hypot(ship.vx, ship.vy);
            if (sp > MAX_SPEED){ ship.vx = ship.vx/sp*MAX_SPEED; ship.vy = ship.vy/sp*MAX_SPEED; }
            ship.x += ship.vx*dt; ship.y += ship.vy*dt;
            wrap(ship);
            if (ship.cooldown > 0) ship.cooldown -= dt;
            if (ship.invuln > 0){ ship.invuln -= dt; ship.blink += dt; }
            if (keys.fire) fire();
        } else {
            if (thrustHumOn) stopThrustHum();
        }

        // bullets
        for (let i=bullets.length-1;i>=0;i--){
            const b = bullets[i];
            b.x += b.vx*dt; b.y += b.vy*dt;
            b.life -= dt;
            wrap(b);
            if (b.life <= 0){ bullets.splice(i,1); }
        }

        // rocks
        for (const r of rocks){
            r.x += r.vx*dt; r.y += r.vy*dt;
            r.angle += r.spin*dt;
            wrap(r);
        }

        // bullet vs rock
        for (let i=rocks.length-1;i>=0;i--){
            const r = rocks[i];
            let hit = false;
            for (let j=bullets.length-1;j>=0;j--){
                const b = bullets[j];
                if ((b.x-r.x)*(b.x-r.x) + (b.y-r.y)*(b.y-r.y) <= r.r*r.r){
                    bullets.splice(j,1);
                    hit = true;
                    break;
                }
            }
            if (hit){
                rocks.splice(i,1);
                splitRock(r);
            }
        }

        // ship vs rock
        if (ship && ship.alive && ship.invuln <= 0){
            for (const r of rocks){
                const rr = r.r + SHIP_R*0.7;
                if ((ship.x-r.x)*(ship.x-r.x) + (ship.y-r.y)*(ship.y-r.y) <= rr*rr){
                    loseLife();
                    break;
                }
            }
        }

        // wave clear
        if (rocks.length === 0){
            nextWave();
        }
    }

    // ---- thrust hum (optional continuous tone) ----
    let thrustHumOn = false, humOsc = null, humGain = null;
    function startThrustHum(){
        if (muted) return;
        try {
            if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
            humOsc = actx.createOscillator(); humGain = actx.createGain();
            humOsc.type = 'sawtooth'; humOsc.frequency.value = 70;
            humGain.gain.value = 0.03;
            humOsc.connect(humGain); humGain.connect(actx.destination);
            humOsc.start();
            thrustHumOn = true;
        } catch(e){}
    }
    function stopThrustHum(){
        try { if (humOsc){ humGain.gain.setTargetAtTime(0.0001, actx.currentTime, 0.05); humOsc.stop(actx.currentTime + 0.12); } } catch(e){}
        humOsc = null; humGain = null; thrustHumOn = false;
    }

    // ---- render ----
    function drawStars(){
        for (const s of stars){
            ctx.globalAlpha = s.a;
            ctx.fillStyle = '#f2f0ec';
            ctx.fillRect(s.x, s.y, s.r, s.r);
        }
        ctx.globalAlpha = 1;
    }

    function drawShip(){
        if (!ship || !ship.alive) return;
        // blink during invulnerability
        if (ship.invuln > 0 && Math.floor(ship.blink*10) % 2 === 0) return;
        ctx.save();
        ctx.translate(ship.x, ship.y);
        ctx.rotate(ship.angle);
        // thrust flame
        if (ship.thrusting){
            ctx.strokeStyle = '#ff4d2e';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#ff4d2e'; ctx.shadowBlur = 10;
            ctx.beginPath();
            const f = SHIP_R * (1.1 + Math.random()*0.5);
            ctx.moveTo(-SHIP_R*0.6, -5);
            ctx.lineTo(-f, 0);
            ctx.lineTo(-SHIP_R*0.6, 5);
            ctx.stroke();
        }
        // ship body (glowing vector outline)
        ctx.strokeStyle = '#f2f0ec';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#ff8a3d'; ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(SHIP_R, 0);
        ctx.lineTo(-SHIP_R*0.75, -SHIP_R*0.7);
        ctx.lineTo(-SHIP_R*0.4, 0);
        ctx.lineTo(-SHIP_R*0.75, SHIP_R*0.7);
        ctx.closePath();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    function drawRocks(){
        ctx.lineWidth = 2;
        for (const r of rocks){
            ctx.save();
            ctx.translate(r.x, r.y);
            ctx.rotate(r.angle);
            ctx.strokeStyle = r.size===3 ? '#ff8a3d' : (r.size===2 ? '#ff6a34' : '#ff4d2e');
            ctx.shadowColor = '#ff4d2e'; ctx.shadowBlur = 8;
            ctx.beginPath();
            for (let i=0;i<r.n;i++){
                const a = (i/r.n)*Math.PI*2;
                const rad = r.r * r.verts[i];
                const x = Math.cos(a)*rad, y = Math.sin(a)*rad;
                if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
        }
        ctx.shadowBlur = 0;
    }

    function drawBullets(){
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#ff8a3d'; ctx.shadowBlur = 8;
        for (const b of bullets){
            ctx.beginPath();
            ctx.arc(b.x, b.y, 2.2, 0, 7);
            ctx.fill();
        }
        ctx.shadowBlur = 0;
    }

    function drawParticles(){
        for (const p of particles){
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.col;
            ctx.fillRect(p.x, p.y, p.sz, p.sz);
        }
        ctx.globalAlpha = 1;
    }

    function render(){
        ctx.clearRect(0,0,W,H);
        ctx.save();
        if (shake > 0) ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake);
        drawStars();
        drawParticles();
        drawRocks();
        drawBullets();
        drawShip();
        ctx.restore();
    }

    // ---- loop ----
    let last = 0;
    function frame(ts){
        const dt = last ? Math.min((ts-last)/1000, 0.033) : 0; last = ts;
        if (!paused) update(dt);
        render();
        requestAnimationFrame(frame);
    }

    window.addEventListener('resize', fit);
    fit();
    updateHud();
    showOverlay('Aster<span>oids</span>', 'Rotate, thrust, and blast the rocks. Do not get hit.', null, 'Play', true);
    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
